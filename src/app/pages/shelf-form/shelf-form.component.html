<form (ngSubmit)="edit()" [formGroup]="form">
  <mat-toolbar>
    <a routerLink="/shelfs" mat-icon-button color="accent"><mat-icon>arrow_back</mat-icon></a>
    <span *ngIf="!entity">Nouveau produit</span>
    <span *ngIf="entity">Produit {{ entity.name }}</span>
    <span class="toolbar-spacer"></span>
    <button type="submit" mat-icon-button color="warn"><mat-icon>check</mat-icon></button>
  </mat-toolbar>

  <mat-card class="page-margin">
    <mat-card-content>
      <div class="loading-shade"
           *ngIf="isLoadingResults">
        <mat-spinner></mat-spinner>
      </div>
      <app-shelf [shelf]="entity" (formOutput)="formUpdate($event)"></app-shelf>
    </mat-card-content>
  </mat-card>
</form>
